format = '''$username$hostname$env_var$localip$shlvl$singularity$kubernetes$directory$vcsh$fossil_branch$fossil_metrics$git_branch$git_commit$git_state$git_metrics$git_status$hg_branch$hg_state$pijul_channel$docker_context$package$c$cmake$cobol$daml$dart$deno$dotnet$elixir$elm$erlang$fennel$fortran$gleam$golang$guix_shell$haskell$haxe$helm$java$julia$kotlin$gradle$lua$nim$nodejs$ocaml$opa$perl$php$pulumi$purescript$python$quarto$raku$rlang$red$ruby$rust$scala$solidity$swift$terraform$typst$vlang$vagrant$zig$buf$nix_shell$conda$meson$spack$memory_usage$aws$gcloud$openstack$azure$nats$direnv$mise$crystal$custom$sudo$cmd_duration$line_break$jobs$battery$time$status$os$container$netns$shell$character'''

[shell]
bash_indicator = "\\$"
zsh_indicator = ""
disabled = false

[git_status]
conflicted = '🏳'
ahead = '⇡${count}'
behind = '⇣${count}'
diverged = '⇕⇡${ahead_count}⇣${behind_count}'
up_to_date = '[✓](bold green)'
untracked = '[?$count](blue)'
stashed = '[📦$count](yellow)'
modified = '[*$count](red)'
staged = '[+$count](green)'
renamed = '[>$count](green)'
deleted = '[-$count](red)'

[username]
show_always = true
format = '[$user](yellow)@'

[hostname]
ssh_only = false
format = '[$hostname](bold green)'
disabled = false

[env_var.SHPOOL_SESSION_NAME]
default = ""
variable = "SHPOOL_SESSION_NAME"
format = "[{$env_value}](bold red) "
disabled = false
